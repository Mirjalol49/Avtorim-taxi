<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

  <!-- CSP: removed Firebase URLs, added Supabase -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://api-maps.yandex.ru; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://api-maps.yandex.ru;">

  <!-- PWA -->
  <meta name="theme-color" content="#0f766e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Taksapark" />
  <meta name="description" content="Taksapark - Professional taksi parkini boshqarish tizimi" />

  <title>Taksapark - Boshqaruv Paneli</title>

  <!-- Favicons -->
  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

  <!-- Blocking theme init: apply dark class before first paint to prevent FOUC -->
  <script>
    (function() {
      var saved = localStorage.getItem('avtorim_theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (saved === 'dark' || (!saved && prefersDark) || (!saved && true)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>

  <style>
    :root {
      --color-bg-init: #EEF2F8;
      --color-text-init: #0D1526;
    }
    html.dark {
      --color-bg-init: #0B0C13;
      --color-text-init: #EEF0F8;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', 'Roboto',
        'Helvetica Neue', Arial, sans-serif;
      background-color: var(--color-bg-init);
      color: var(--color-text-init);
      user-select: none;
      -webkit-user-select: none;
    }

    button, [role="button"] { cursor: pointer; }

    input, textarea {
      user-select: text;
      -webkit-user-select: text;
    }

    .font-mono, input[type="number"], .numeric {
      font-variant-numeric: tabular-nums;
    }

    @keyframes slide-in-right {
      from { transform: translateX(100%); opacity: 0; }
      to   { transform: translateX(0);   opacity: 1; }
    }
    .animate-slide-in-right { animation: slide-in-right 0.3s ease-out; }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
